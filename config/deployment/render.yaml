envVarGroups:
  - name: python-services
    envVars:
      - key: PYTHON_VERSION
        value: 3.13
      - key: POETRY_VERSION
        value: 2.0.1
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_SETTINGS_MODULE
        value: gold3.settings.production
      - key: ALLOWED_HOSTS
        value: '*'
  - name: integrations-credentials
    envVars:
      - key: SENDGRID_USERNAME
        value: apikey
      - key: SENDGRID_PASSWORD
        value: placeholder-value
