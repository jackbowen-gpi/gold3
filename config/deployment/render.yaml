databases:
  - name: gold3-postgres
    databaseName: gold3
    plan: free
    user: gold3

services:
  - type: redis
    name: gold3-redis
    plan: free
    ipAllowList: [] # only allow internal connections

  - type: web
    name: gold3
    plan: free
    runtime: python
  buildCommand: "config/deployment/render_build.sh"
    startCommand: "poetry run gunicorn gold3.wsgi:application --chdir backend --limit-request-line 8188 --log-file -"
    envVars:
      - key: ENABLE_DJANGO_COLLECTSTATIC
        value: 1
      - key: AUTO_MIGRATE
        value: 1
      - key: DATABASE_URL
        fromDatabase:
          name: gold3-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: gold3-redis
          property: connectionString
      - fromGroup: python-services
      - fromGroup: integrations-credentials
      - key: SENTRY_ENVIRONMENT
        value: "local_base"
      - key: SENTRY_RELEASE
        value: "0.1.0"  
      - key: SENTRY_API_KEY
        value: "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"
      - key: SENTRY_ORG
        value: "jack-bowen"
      - key: SENTRY_PROJECT_NAME
        value: "gold3"


